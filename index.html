<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supersaurus</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-bar">
    <div class="brand">
      <div class="logo-circle" aria-hidden="true"></div>
      <span class="brand-name">Supersaurus</span>
    </div>
    <nav class="top-nav" aria-label="Primary">
      <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#game">Game</a></li>
        <li><a href="#press">Press</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero" id="hero" aria-label="Hero">
    <img
      src="images/original_composition_small.jpg"
      alt="Supersaurus hero composition"
      class="hero-image"
      id="heroImage"
    />
    <canvas class="hero-canvas" id="heroCanvas" aria-hidden="true"></canvas>
    <canvas class="ember-canvas" id="emberCanvas" aria-hidden="true"></canvas>
    <img
      src="images/library_logo_transparent.png"
      alt="Punch Upon A Time"
      class="hero-logo"
      id="heroLogo"
    />
  </section>

  <script src="hero-parallax.js"></script>
  <script src="ember-particles.js"></script>
</body>
</html>
