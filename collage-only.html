<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supersaurus — Collage Background</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #f4eee2;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .collage-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    /* Fixed-design stage: 1920x1080 reference, transform-scaled to cover iframe.
       Slots use % of stage so the composition keeps its proportions at any aspect. */
    .collage-stage {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1920px;
      height: 1080px;
      transform: translate(-50%, -50%) scale(var(--stage-scale, 1));
      transform-origin: center;
    }
    .collage-img {
      position: absolute;
      object-fit: cover;
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.18),
        0 8px 22px rgba(40, 25, 10, 0.25);
      filter: sepia(0.18) saturate(1.05) contrast(1.02);
      background: #fff;
      padding: 4px 4px 14px 4px;
    }

    /* Montage drift wrapper: each slot cross-fades and slides slowly. */
    .collage-slot {
      position: absolute;
      animation: driftFade var(--dur, 22s) ease-in-out infinite;
      animation-delay: var(--dly, 0s);
      will-change: transform, opacity;
    }
    .collage-slot > .collage-img {
      position: static;
      left: auto;
      top: auto;
      width: 100%;
      display: block;
    }
    @keyframes driftFade {
      0%   { transform: translate(var(--dx0, -4vw), var(--dy0, 0));  opacity: 0; }
      15%  {                                                         opacity: 1; }
      85%  {                                                         opacity: 1; }
      100% { transform: translate(var(--dx1,  4vw), var(--dy1, 0));  opacity: 0; }
    }
    .collage-vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(
        ellipse at center,
        transparent 45%,
        rgba(30, 20, 10, 0.25) 100%
      );
    }
    .film-grain {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      mix-blend-mode: overlay;
      opacity: 0.42;
      z-index: 3;
    }

    .chris-sweat {
      position: absolute;
      pointer-events: none;
      overflow: visible;
      z-index: 4;
    }
    .sweat-drop {
      position: absolute;
      left: var(--x, 30%);
      top: var(--y, 20%);
      width: calc(15px * var(--scale, 1));
      height: calc(22px * var(--scale, 1));
      opacity: 0;
      filter: drop-shadow(0 1px 1.5px rgba(0, 0, 0, 0.25));
      animation: drip 2.4s cubic-bezier(0.5, 0, 0.75, 0) infinite;
      animation-delay: var(--delay, 0s);
    }
    .sweat-drop--splash {
      animation-name: dripSplash;
      animation-timing-function: linear;
      transform-origin: 50% 100%;
    }
    @keyframes drip {
      0%   { transform: translateY(0) scale(0.4);  opacity: 0; }
      12%  { transform: translateY(2px) scale(0.8); opacity: 0.5; }
      25%  { transform: translateY(6px) scale(1);   opacity: 1; }
      70%  { transform: translateY(195px) scale(1); opacity: 1; }
      100% { transform: translateY(280px) scale(1.2); opacity: 0; }
    }
    @keyframes dripSplash {
      0%   { transform: translateY(0) scale(0.4);                        opacity: 0; }
      10%  { transform: translateY(2px) scale(0.8);                      opacity: 0.5; }
      20%  { transform: translateY(6px) scale(1);                        opacity: 1; }
      62%  { transform: translateY(195px) scale(1);                      opacity: 1; }
      68%  { transform: translateY(195px) scaleX(2.2) scaleY(0.25);      opacity: 1; }
      78%  { transform: translateY(195px) scaleX(1.6) scaleY(0.35);      opacity: 0.6; }
      100% { transform: translateY(195px) scaleX(0.9) scaleY(0.15);      opacity: 0; }
    }

    .sweat-ripple {
      position: absolute;
      left: var(--x, 30%);
      top: calc(var(--y, 50%) + 195px);
      width: calc(20px * var(--scale, 1));
      height: calc(7px * var(--scale, 1));
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.3);
      animation: ripple 2.4s linear infinite;
      animation-delay: var(--delay, 0s);
      pointer-events: none;
      margin-left: calc(15px * var(--scale, 1) * 0.5);
      margin-top: calc(22px * var(--scale, 1));
    }
    @keyframes ripple {
      0%, 60% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      68%     { transform: translate(-50%, -50%) scale(0.5); opacity: 0.9; }
      82%     { transform: translate(-50%, -50%) scale(1.1); opacity: 0.4; }
      100%    { transform: translate(-50%, -50%) scale(1.7); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="collage-bg" id="collageBg" aria-hidden="true"></div>
  <canvas class="film-grain" id="filmGrain" aria-hidden="true"></canvas>
  <div class="collage-vignette" aria-hidden="true"></div>

  <script src="collage.js"></script>
  <script src="iframe-scroll-forward.js"></script>
</body>
</html>
