<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supersaurus — People</title>
  <style>
    :root {
      --tile-bg: #ffffff;
      --page-bg: #f4eee2;
      --gap: clamp(10px, 1.2vw, 18px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--page-bg);
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Collage background layer */
    .collage-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    .collage-img {
      position: absolute;
      object-fit: cover;
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.18),
        0 8px 22px rgba(40, 25, 10, 0.25);
      filter: sepia(0.18) saturate(1.05) contrast(1.02);
      background: #fff;
      padding: 4px 4px 14px 4px; /* polaroid-ish border */
      transition: none;
    }
    .collage-vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(
        ellipse at center,
        transparent 45%,
        rgba(30, 20, 10, 0.25) 100%
      );
    }

    /* Film grain overlay */
    .film-grain {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      mix-blend-mode: overlay;
      opacity: 0.42;
      z-index: 3;
      image-rendering: auto;
    }

    /* People grid on top */
    .people-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
      width: min(62vw, calc(78vh * 1.5));
      position: relative;
      z-index: 4;
    }
    .people-tile {
      position: relative;
      overflow: hidden;
      background: transparent;
      border-radius: 18px;
      aspect-ratio: 3 / 4;
    }
    .people-tile canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    @media (max-width: 1100px) {
      .people-grid {
        grid-template-columns: repeat(2, 1fr);
        width: min(64vw, calc(42vh * 1.5));
      }
    }
    @media (max-width: 560px) {
      .people-grid {
        grid-template-columns: 1fr;
        width: min(64vw, calc(20vh * 1.5));
      }
    }
  </style>
</head>
<body>
  <div class="collage-bg" id="collageBg" aria-hidden="true"></div>
  <canvas class="film-grain" id="filmGrain" aria-hidden="true"></canvas>
  <div class="collage-vignette" aria-hidden="true"></div>

  <div class="people-grid" id="peopleGrid">
    <div class="people-tile" data-index="0" data-color="images/People/1.png" data-depth="images/People/1_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="1" data-color="images/People/2.png" data-depth="images/People/2_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="2" data-color="images/People/3.png" data-depth="images/People/3_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="3" data-color="images/People/4.png" data-depth="images/People/4_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="4" data-color="images/People/5.png" data-depth="images/People/5_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="5" data-color="images/People/6.png" data-depth="images/People/6_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="6" data-color="images/People/7.png" data-depth="images/People/7_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="7" data-color="images/People/8.png" data-depth="images/People/8_depth.jpg"><canvas></canvas></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script src="collage.js"></script>
  <script type="module" src="people.js"></script>
</body>
</html>
