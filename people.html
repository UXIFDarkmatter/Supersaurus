<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supersaurus — People</title>
  <style>
    :root {
      --tile-bg: #ffffff;
      --page-bg: #ffffff;
      --gap: clamp(10px, 1.2vw, 18px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--page-bg);
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .people-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
      /* Size: width-constrained or height-constrained, whichever is smaller.
         Tile aspect ~3:4 → 2 rows of height (W/4)*4/3 = W/3 each, total 2W/3 + gap.
         So grid width max = (available height) * 1.5 approximately. */
      width: min(82vw, calc(80vh * 1.5));
    }
    .people-tile {
      position: relative;
      overflow: hidden;
      background: var(--tile-bg);
      border-radius: 6px;
      aspect-ratio: 3 / 4;
    }
    .people-tile canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    @media (max-width: 1100px) {
      .people-grid {
        grid-template-columns: repeat(2, 1fr);
        width: min(70vw, calc(42vh * 1.5));
      }
    }
    @media (max-width: 560px) {
      .people-grid {
        grid-template-columns: 1fr;
        width: min(70vw, calc(20vh * 1.5));
      }
    }
  </style>
</head>
<body>
  <div class="people-grid" id="peopleGrid">
    <div class="people-tile" data-index="0" data-color="images/People/1.png" data-depth="images/People/1_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="1" data-color="images/People/2.png" data-depth="images/People/2_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="2" data-color="images/People/3.png" data-depth="images/People/3_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="3" data-color="images/People/4.png" data-depth="images/People/4_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="4" data-color="images/People/5.png" data-depth="images/People/5_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="5" data-color="images/People/6.png" data-depth="images/People/6_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="6" data-color="images/People/7.png" data-depth="images/People/7_depth.jpg"><canvas></canvas></div>
    <div class="people-tile" data-index="7" data-color="images/People/8.png" data-depth="images/People/8_depth.jpg"><canvas></canvas></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="people.js"></script>
</body>
</html>
