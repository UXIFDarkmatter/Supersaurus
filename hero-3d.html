<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supersaurus — 3D Hero (experiment)</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .hero { height: 100vh; }
    .hero-3d-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <section class="hero" id="hero" aria-label="Hero">
    <canvas class="hero-3d-canvas" id="hero3dCanvas"></canvas>
    <canvas class="ember-canvas" id="emberCanvas" aria-hidden="true"></canvas>
    <div class="intro-splash" id="introSplash" aria-hidden="true">
      <img src="images/supersaurus.gif" alt="" id="introGif" />
    </div>
    <div class="hero-logo-wrap" id="heroLogoWrap">
      <div class="hero-rays" aria-hidden="true">
        <div class="hero-rays-layer hero-rays-a"></div>
        <div class="hero-rays-layer hero-rays-b"></div>
      </div>
      <img
        src="images/library_logo_transparent.png"
        alt="Punch Upon A Time"
        class="hero-logo"
        id="heroLogo"
      />
    </div>
  </section>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="hero-3d.js"></script>
  <script src="intro-splash.js"></script>
  <script src="ember-particles.js"></script>
</body>
</html>
